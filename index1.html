ap((_, col) =&amp;gt; m.map(row =&amp;gt; row[col]));\n}\n\n// Dot product\nfunction dotProduct(a, b) {\n  return a.reduce((sum, val, i) =&amp;gt; sum + val * b[i], 0);\n}\n\n// Benchmark multiple sizes\nconst benchmarks = [];\nfor (const size of [80, 120, 160]) {\n  const t          = Date.now();\n  const product    = matrixMultiply(size);\n  const transposed = matrixTranspose(product);\n  const dp         = dotProduct(product[0], transposed[0]);\n  benchmarks.push({\n    size,\n    durationMs:  Date.now() - t,\n    sampleValue: product[0][0],\n    dotProduct:  dp\n  });\n}\n\n// Vector stress test\nfunction vectorStress(dimensions, iterations) {\n  let result = 0;\n  for (let i = 0; i &amp;lt; iterations; i++) {\n    const v1 = Array.from({ length: dimensions }, () =&amp;gt; Math.random());\n    const v2 = Array.from({ length: dimensions }, () =&amp;gt; Math.random());\n    result  += dotProduct(v1, v2);\n  }\n  return result;\n}\n\nconst vectorResult = vectorStress(500, 300);\n\nreturn [{\n  json: {\n    branch:            &#39;matrix-ops&#39;,\n    matrixBenchmarks:  benchmarks,\n    vectorStressResult: vectorResult,\n    totalDurationMs:   Date.now() - startTime,\n    timestamp:         new Date().toISOString()\n  }\n}];&amp;quot;},&amp;quot;id&amp;quot;:&amp;quot;27ef1747-b6bf-425b-9184-f84381a9ec90&amp;quot;,&amp;quot;name&amp;quot;:&amp;quot;CPU Work - Matrix Ops1&amp;quot;,&amp;quot;type&amp;quot;:&amp;quot;n8n-nodes-base.code&amp;quot;,&amp;quot;typeVersion&amp;quot;:2,&amp;quot;position&amp;quot;:[1296,240]},{&amp;quot;parameters&amp;quot;:{&amp;quot;jsCode&amp;quot;:&amp;quot;// === BRANCH 3: SORTING + REGEX + STRING OPS ===\nconst startTime = Date.now();\n\n// Bubble sort O(n^2) intentionally slow\nfunction bubbleSort(arr) {\n  const a = [...arr];\n  for (let i = 0; i &amp;lt; a.length; i++) {\n    for (let j = 0; j &amp;lt; a.length - i - 1; j++) {\n      if (a[j] &amp;gt; a[j + 1]) {\n        const tmp = a[j];\n        a[j]      = a[j + 1];\n        a[j + 1]  = tmp;\n      }\n    }\n  }\n  return a;\n}\n\n// Merge sort\nfunction mergeSort(arr) {\n  if (arr.length &amp;lt;= 1) return arr;\n  const mid   = Math.floor(arr.length / 2);\n  const left  = mergeSort(arr.slice(0, mid));\n  const right = mergeSort(arr.slice(mid));\n  const out   = [];\n  let l = 0, r = 0;\n  while (l &amp;lt; left.length &amp;amp;&amp;amp; r &amp;lt; right.length) {\n    if (left[l] &amp;lt;= right[r]) out.push(left[l++]);\n    else out.push(right[r++]);\n  }\n  return [...out, ...left.slice(l), ...right.slice(r)];\n}\n\n// Quicksort\nfunction quickSort(arr) {\n  if (arr.length &amp;lt;= 1) return arr;\n  const pivot  = arr[Math.floor(arr.length / 2)];\n  const left   = arr.filter(x =&amp;gt; x &amp;lt; pivot);\n  const middle = arr.filter(x =&amp;gt; x === pivot);\n  const right  = arr.filter(x =&amp;gt; x &amp;gt; pivot);\n  return [...quickSort(left), ...middle, ...quickSort(right)];\n}\n\nconst smallArr = Array.from({ length: 3000  }, () =&amp;gt; Math.random());\nconst medArr   = Array.from({ length: 30000 }, () =&amp;gt; Math.random());\nconst largeArr = Array.from({ length: 100000}, () =&amp;gt; Math.random());\n\nconst tBubble  = Date.now();\nbubbleSort(smallArr);\nconst bubbleMs = Date.now() - tBubble;\n\nconst tMerge   = Date.now();\nmergeSort(medArr);\nconst mergeMs  = Date.now() - tMerge;\n\nconst tQuick   = Date.now();\nquickSort([...medArr]);\nconst quickMs  = Date.now() - tQuick;\n\nconst tNative  = Date.now();\nlargeArr.sort((a, b) =&amp;gt; a - b);\nconst nativeMs = Date.now() - tNative;\n\n// Regex torture on large generated string\nconst bigText = Array.from({ length: 15000 }, () =&amp;gt;\n  Math.random().toString(36) + &#39; &#39; + Math.random().toString(36)\n).join(&#39;\\n&#39;);\n\nconst regexResults = [\n  { name: &#39;words&#39;,    count: (bigText.match(/[a-z]{3,}/g)      || []).length },\n  { name: &#39;numbers&#39;,  count: (bigText.match(/\\d+\\.\\d+/g)       || []).length },\n  { name: &#39;hex&#39;,      count: (bigText.match(/[0-9a-f]{8}/g)    || []).length },\n  { name: &#39;alphaNum&#39;, count: (bigText.match(/[a-zA-Z0-9]{6}/g) || []).length },\n  { name: &#39;mixed&#39;,    count: (bigText.match(/[a-z]{2}\\d{2}/g)  || []).length }\n];\n\n// String builder and manipulation\nconst tStr  = Date.now();\nconst parts = [];\nfor (let i = 0; i &amp;lt; 50000; i++) {\n  parts.push(Math.random().toString(36).substr(2));\n}\nconst bigStr     = parts.join(&#39;-&#39;);\nconst reversed   = bigStr.split(&#39;&#39;).reverse().join(&#39;&#39;);\nconst upperCount = (reversed.match(/[A-Z]/g) || []).length;\nconst strMs      = Date.now() - tStr;\n\nreturn [{\n  json: {\n    branch: &#39;sort-regex-string&#39;,\n    sortBenchmarks: {\n      bubbleSort: { size: smallArr.length, durationMs: bubbleMs },\n      mergeSort:  { size: medArr.length,   durationMs: mergeMs  },\n      quickSort:  { size: medArr.length,   durationMs: quickMs  },\n      nativeSort: { size: largeArr.length, durationMs: nativeMs }\n    },\n    regexResults,\n    stringOps: {\n      totalChars:     bigStr.length,\n      upperCaseCount: upperCount,\n      durationMs:     strMs\n    },\n    totalDurationMs: Date.now() - startTime,\n    timestamp:       new Date().toISOString()\n  }\n}];&amp;quot;},&amp;quot;id&amp;quot;:&amp;quot;4bff53f4-e6c0-4855-95d4-1bccaaacc065&amp;quot;,&amp;quot;name&amp;quot;:&amp;quot;CPU Work - Sort &amp;amp; String1&amp;quot;,&amp;quot;type&amp;quot;:&amp;quot;n8n-nodes-base.code&amp;quot;,&amp;quot;typeVersion&amp;quot;:2,&amp;quot;position&amp;quot;:[1296,432]},{&amp;quot;parameters&amp;quot;:{&amp;quot;jsCode&amp;quot;:&amp;quot;// === BRANCH 4: JSON + OBJECT + MAP/SET STRESS ===\nconst startTime = Date.now();\n\n// Deep nested object builder\nfunction buildDeepObject(depth, breadth) {\n  if (depth === 0) {\n    return {\n      value:  Math.random(),\n      label:  Math.random().toString(36).substr(2, 8),\n      active: Math.random() &amp;gt; 0.5,\n      scores: Array.from({ length: 10 }, () =&amp;gt; Math.random())\n    };\n  }\n  const obj = {};\n  for (let i = 0; i &amp;lt; breadth; i++) {\n    obj[`node_${depth}_${i}`] = buildDeepObject(depth - 1, breadth);\n  }\n  return obj;\n}\n\n// Count all leaf nodes in object tree\nfunction countLeafNodes(obj) {\n  if (typeof obj !== &#39;object&#39; || obj === null) return 1;\n  return Object.values(obj).reduce((sum, v) =&amp;gt; sum + countLeafNodes(v), 0);\n}\n\n// JSON round trip stress\nfunction jsonRoundTrip(obj, times) {\n  let result = obj;\n  for (let i = 0; i &amp;lt; times; i++) {\n    result = JSON.parse(JSON.stringify(result));\n  }\n  return result;\n}\n\n// Array of objects: filter + sort + reduce + map\nfunction arrayObjectStress(size) {\n  const arr = Array.from({ length: size }, (_, i) =&amp;gt; ({\n    id:     i,\n    value:  Math.random() * 1000,\n    label:  Math.random().toString(36).substr(2, 6),\n    active: Math.random() &amp;gt; 0.5\n  }));\n  const filtered = arr.filter(x =&amp;gt; x.active &amp;amp;&amp;amp; x.value &amp;gt; 500);\n  const sorted   = filtered.sort((a, b) =&amp;gt; b.value - a.value);\n  const total    = sorted.reduce((sum, x) =&amp;gt; sum + x.value, 0);\n  const mapped   = sorted.slice(0, 10).map(x =&amp;gt; ({\n    ...x,\n    normalised: x.value / total\n  }));\n  return {\n    originalSize: arr.length,\n    filteredSize: filtered.length,\n    total:        Math.round(total),\n    top10:        mapped.length\n  };\n}\n\n// Map and Set stress test\nfunction mapSetStress(size) {\n  const map = new Map();\n  const set = new Set();\n  for (let i = 0; i &amp;lt; size; i++) {\n    const key = Math.random().toString(36).substr(2, 6);\n    map.set(key, { index: i, value: Math.random() });\n    set.add(key);\n  }\n  let lookups = 0;\n  for (const key of set) {\n    if (map.has(key)) lookups++;\n  }\n  return { mapSize: map.size, setSize: set.size, lookups };\n}\n\nconst tDeep     = Date.now();\nconst deepObj   = buildDeepObject(4, 4);\nconst leafCount = countLeafNodes(deepObj);\nconst deepMs    = Date.now() - tDeep;\n\nconst tJson     = Date.now();\njsonRoundTrip(deepObj, 20);\nconst jsonMs    = Date.now() - tJson;\n\nconst arrayResult = arrayObjectStress(50000);\nconst mapResult   = mapSetStress(100000);\n\nreturn [{\n  json: {\n    branch: &#39;json-object-stress&#39;,\n    deepObject: {\n      leafNodes:  leafCount,\n      buildMs:    deepMs\n    },\n    jsonRoundTrips: {\n      times:      20,\n      durationMs: jsonMs\n    },\n    arrayObjectResult: arrayResult,\n    mapSetResult:      mapResult,\n    totalDurationMs:   Date.now() - startTime,\n    timestamp:         new Date().toISOString()\n  }\n}];&amp;quot;},&amp;quot;id&amp;quot;:&amp;quot;b276679a-af51-44e7-8cf9-bcaadff4598f&amp;quot;,&amp;quot;name&amp;quot;:&amp;quot;CPU Work - JSON &amp;amp; Objects1&amp;quot;,&amp;quot;type&amp;quot;:&amp;quot;n8n-nodes-base.code&amp;quot;,&amp;quot;typeVersion&amp;quot;:2,&amp;quot;position&amp;quot;:[1296,640]},{&amp;quot;parameters&amp;quot;:{},&amp;quot;id&amp;quot;:&amp;quot;2f4299ad-7d8c-4d03-a3e2-249cb297b272&amp;quot;,&amp;quot;name&amp;quot;:&amp;quot;Merge Results1&amp;quot;,&amp;quot;type&amp;quot;:&amp;quot;n8n-nodes-base.merge&amp;quot;,&amp;quot;typeVersion&amp;quot;:2,&amp;quot;position&amp;quot;:[1568,336]},{&amp;quot;parameters&amp;quot;:{&amp;quot;jsCode&amp;quot;:&amp;quot;// === FINAL AGGREGATION - fully sandbox safe ===\nconst items = $input.all();\n\nconst branchSummary = items.map(item =&amp;gt; ({\n  branch:     item.json.branch,\n  durationMs: item.json.durationMs || item.json.totalDurationMs || 0\n}));\n\nconst totalCpuMs = branchSummary.reduce((sum, b) =&amp;gt; sum + b.durationMs, 0);\nconst sorted     = [...branchSummary].sort((a, b) =&amp;gt; b.durationMs - a.durationMs);\n\nreturn [{\n  json: {\n    status:        &#39;complete&#39;,\n    totalBranches: items.length,\n    totalCpuMs,\n    avgBranchMs:   Math.round(totalCpuMs / items.length),\n    slowestBranch: sorted[0],\n    fastestBranch: sorte       (function() {

      &#39;=&#39;,

      &#39;;domain=.&#39;,

    } catch (e) {

  // We apply a limit on a presignup breadcrumbs entry in order to not allow cookie to grow too big
  // (above 4000 bytes, which was a max size of cookies allowed by our infrastructure
  // when the issue was reported).
  //
  // A sophisticated approach could be to check length of a whole cookie and, if too big in bytes,
  // decide what data to remove from the cookie. But we decided to take a simplified one:
  // we know that &#34;presignup_breadcrumbs&#34; is so far the only first touch cookie&#39;s field which
  // grows a lot over time (adding a URL to an array potentially on every page visit), therefore 
  // we can focus on that field only. Next, we do not count real bytes in a serialized cookie,
  // but string chars (they could differ for example for emojis, but we do not expect emojis in URLs).

        }

    }

    function getURLDomainName(url) {
      var a = document.createElement(&#39;a&#39;);
      a.href = url;
      return a.hostname;
    }

      var match = &#39;utm_&#39;;

    }

    function handleFirstTouchParams(firstTouchCookieKey, gatherFirstTouchParamsFn, updateBreadcrumbInFirstTouchParamsFn) {

      function updateBreadcrumbInFirstTouchParams(firstTouchParams, breadcrumb) {
        if (!firstTouchParams.presignup_breadcrumbs) {

        firstTouchParams.presignup_breadcrumbs.push(breadcrumb);
